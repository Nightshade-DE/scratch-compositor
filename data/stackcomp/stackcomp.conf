# Copy to ~/.config/stackcomp/config or set STACKCOMP_CONFIG / stackcomp -c PATH
# Each [bind] block is one shortcut. Modifier set uses mods= (Super, Shift, Ctrl, Alt).
# Optional when= runs /bin/sh -c '...' on each key press; exit 0 means the bind is active.

#startup, shutdown, reload scripts are in the config directory
[hooks]
startup = ~/.config/stackcomp/startup.sh
shutdown = ~/.config/stackcomp/shutdown.sh
reload = ~/.config/stackcomp/reload.sh

#animations are enabled by default
[layout_anim]
enabled = yes
speed = 10.0
epsilon = 0.25

#default binds
[bind]
mods = Super
key = Return
action = exec
command = alacritty

[bind]
mods = Super+Shift
key = Q
action = close

[bind]
mods = Super+Shift
key = T
action = exec
command = stackcomp --layout tile
when = [ "$STACKCOMP_LAYOUT" = stack ]

[bind]
mods = Super+Shift
key = T
action = exec
command = stackcomp --layout scroll
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = T
action = exec
command = stackcomp --layout stack
when = [ "$STACKCOMP_LAYOUT" = scroll ]


[bind]
mods = Super+Shift
key = Right
action = tile_right
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Left
action = tile_left
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Up
action = tile_up
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Down
action = tile_down
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Left
action = scroll_prev
when = [ "$STACKCOMP_LAYOUT" = scroll ]

[bind]
mods = Super+Shift
key = Right
action = scroll_next
when = [ "$STACKCOMP_LAYOUT" = scroll ]

