# Copy to ~/.config/morph/morph.conf or point Morph at another path with MORPH_CONFIG or morph -c.
# The full configuration reference lives in docs/CONFIG.md and docs/morph.conf.example.
#
# Runtime notes:
# - X11 apps use xwayland-satellite when MORPH_X11 is enabled.
# - _JAVA_AWT_WM_NONREPARENTING=1 is exported for the session to help Java launchers.
# - IPC uses $XDG_RUNTIME_DIR/morph-ipc.sock by default. morph --no-ipc disables the socket.
# - morph --layout, --scroll, --tile-move, --scroll-move, --tile-grid, --workspace,
#   --workspace-move, and morph --reload-config can talk to a running instance over IPC.

# ----------------------------------------------------------------------------
# Lifecycle hooks
# ----------------------------------------------------------------------------
# User-facing lifecycle hooks live under the Morph XDG config directory.
# In the managed session flow, startup and reload pass through Morph's system hooks first.
# Shutdown runs the user hook before the managed cleanup hook.
[hooks]
startup = ~/.config/morph/startup.sh
shutdown = ~/.config/morph/shutdown.sh
reload = ~/.config/morph/reload.sh

# Example shell-hook alternatives when you want inline commands instead of hook files.
# [hooks]
# startup = waybar &
# shutdown = pkill -x waybar 2>/dev/null || true
# reload = pkill -USR1 waybar 2>/dev/null || true

# ----------------------------------------------------------------------------
# Layout animation
# ----------------------------------------------------------------------------
# [layout_anim] controls scene-node easing for tile and scroll movement.
# This master config keeps animation enabled, but uses slightly snappier values than the defaults.
#
# Default values if you want to restore the stock tuning.
# [layout_anim]
# enabled = yes
# speed = 15
# epsilon = 0.35

[layout_anim]
enabled = yes
speed = 10.0
epsilon = 0.25

# ----------------------------------------------------------------------------
# Key bindings
# ----------------------------------------------------------------------------
# Each [bind] block describes one shortcut.
# Optional when= runs /bin/sh -c on every key press; exit status 0 means the bind is active.
# Runtime environment for when=:
# - MORPH_LAYOUT is stack, tile, or scroll.
# - MORPH_WORKSPACE is the active workspace number as 1..9.

# Launch a terminal.
[bind]
mods = Super
key = Return
action = exec
command = alacritty

# Close the focused XDG toplevel.
[bind]
mods = Super+Shift
key = Q
action = close

# Cycle layouts with one key: stack -> tile.
[bind]
mods = Super+Shift
key = T
action = exec
command = morph --layout tile
when = [ "$MORPH_LAYOUT" = stack ]

# Cycle layouts with one key: tile -> scroll.
[bind]
mods = Super+Shift
key = T
action = exec
command = morph --layout scroll
when = [ "$MORPH_LAYOUT" = tile ]

# Cycle layouts with one key: scroll -> stack.
[bind]
mods = Super+Shift
key = T
action = exec
command = morph --layout stack
when = [ "$MORPH_LAYOUT" = scroll ]

# Open PulseAudio control.
[bind]
mods = Super
key = Escape
action = exec
command = pavucontrol

# Tile-layout directional movement: move one slot to the right in tile mode.
[bind]
mods = Super+Shift
key = Right
action = tile_right
when = [ "$MORPH_LAYOUT" = tile ]

# Tile-layout directional movement: move one slot to the left in tile mode.
[bind]
mods = Super+Shift
key = Left
action = tile_left
when = [ "$MORPH_LAYOUT" = tile ]

# Tile-layout directional movement: move one row up in the current tile column.
[bind]
mods = Super+Shift
key = Up
action = tile_up
when = [ "$MORPH_LAYOUT" = tile ]

# Tile-layout directional movement: move one row down in the current tile column.
[bind]
mods = Super+Shift
key = Down
action = tile_down
when = [ "$MORPH_LAYOUT" = tile ]

# Scroll-layout directional movement: move one viewport step to the previous slot.
[bind]
mods = Super+Shift
key = Left
action = scroll_prev
when = [ "$MORPH_LAYOUT" = scroll ]

# Scroll-layout directional movement: move one viewport step to the next slot.
[bind]
mods = Super+Shift
key = Right
action = scroll_next
when = [ "$MORPH_LAYOUT" = scroll ]

# Optional launcher only when fuzzel exists.
# [bind]
# mods = Super
# key = D
# action = exec
# command = fuzzel
# when = command -v fuzzel >/dev/null 2>&1

# Optional direct layout binds if you prefer dedicated shortcuts instead of the T cycle.
# [bind]
# mods = Super
# key = T
# action = layout_tile
#
# [bind]
# mods = Super
# key = S
# action = layout_scroll
#
# [bind]
# mods = Super
# key = Space
# action = layout_toggle

# Optional workspace binds.
# Morph currently provides 9 workspaces.
# workspace / workspace_goto and workspace_move require command= with a value from 1 to 9.
# workspace_next / ws_next and workspace_prev / ws_prev cycle with wraparound.
#
# [bind]
# mods = Super
# key = 1
# action = workspace
# command = 1
#
# [bind]
# mods = Super+Shift
# key = 2
# action = workspace_move
# command = 2
#
# [bind]
# mods = Super
# key = Page_Down
# action = workspace_next
#
# [bind]
# mods = Super
# key = Page_Up
# action = workspace_prev

# Optional extended tile and grid movement examples.
# These are no-ops when the focused window is not a tiled XDG toplevel.
#
# [bind]
# mods = Super+Shift
# key = bracketleft
# action = tile_left
#
# [bind]
# mods = Super+Shift
# key = bracketright
# action = tile_right
#
# [bind]
# mods = Super+Shift
# key = Home
# action = tile_first
#
# [bind]
# mods = Super+Shift
# key = End
# action = tile_last
#
# [bind]
# mods = Super+Shift
# key = M
# action = tile_move
# command = -3
#
# [bind]
# mods = Super+Shift
# key = Left
# action = tile_grid_move
# command = left
#
# [bind]
# mods = Super+Shift
# key = K
# action = tile_grid_move
# command = up 2
#
# [bind]
# mods = Super+Shift
# key = Home
# action = tile_col_top
#
# [bind]
# mods = Super+Shift
# key = End
# action = tile_col_bottom

# ----------------------------------------------------------------------------
# Decorations
# ----------------------------------------------------------------------------
# If omitted, Morph strips client title bars in tile and scroll by default for clients
# that support xdg-decoration. Stack layout and tile-float windows keep client-side decorations.
#
# [decoration]
# strip_in_tile_scroll = yes

# Optional overrides for specific apps or titles. First matching rule wins.
# [decoration_rule]
# app_id = ^mpv$
# strip = no
#
# [decoration_rule]
# title = ^Picture-in-Picture$
# strip = no

# ----------------------------------------------------------------------------
# Tile rules
# ----------------------------------------------------------------------------
# The master config keeps pavucontrol floating in tile layout.
[tile_rule]
app_id = pavucontrol
mode = float

# Additional tile-rule examples.
# First matching rule wins.
# mode = tile keeps the window in the grid.
# mode = float keeps the window floating on top in tile layout.
# order = integer changes the sort order among tiled windows; lower values come earlier.
#
# [tile_rule]
# app_id = ^org\.wezfurlong\.wezterm$
# mode = float
#
# [tile_rule]
# title = ^vim
# order = -10

# ----------------------------------------------------------------------------
# Input mapping
# ----------------------------------------------------------------------------
# Optional input-to-output mapping rules for touch, tablet, or pointer devices.
# First matching rule wins.
# Required keys:
# - match= or name=: POSIX extended regex for the device name
# - output=: connector name such as eDP-1, HDMI-A-1, or DP-2
# Optional type=: touch, tablet/stylus/pen, pointer/mouse, all, or both
# If type= is omitted, the rule applies to touch and tablet devices.
#
# [input_map]
# match = ^HUION .*
# output = DP-2
# type = tablet

# ----------------------------------------------------------------------------
# Legacy compatibility
# ----------------------------------------------------------------------------
# [pointer] is only kept for backward compatibility.
# Morph accepts resize_border_px= or resize_border= so older configs do not fail to load,
# but the compositor now uses a fixed minimal outside edge zone instead.
#
# [pointer]
# resize_border_px = 8
