# Copy to ~/.config/morph/morph.conf or set MORPH_CONFIG / morph -c PATH
# Each [bind] block is one shortcut. Modifier set uses mods= (Super, Shift, Ctrl, Alt).
# Optional when= runs /bin/sh -c '...' on each key press; exit 0 means the bind is active.

# User-facing lifecycle hooks live under the morph XDG config directory.
[hooks]
startup = ~/.config/morph/startup.sh
shutdown = ~/.config/morph/shutdown.sh
reload = ~/.config/morph/reload.sh

#animations are enabled by default
[layout_anim]
enabled = yes
speed = 10.0
epsilon = 0.25

#default binds
[bind]
mods = Super
key = Return
action = exec
command = alacritty

[bind]
mods = Super+Shift
key = Q
action = close

[bind]
mods = Super+Shift
key = T
action = exec
command = morph --layout tile
when = [ "$MORPH_LAYOUT" = stack ]

[bind]
mods = Super+Shift
key = T
action = exec
command = morph --layout scroll
when = [ "$MORPH_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = T
action = exec
command = morph --layout stack
when = [ "$MORPH_LAYOUT" = scroll ]

[bind]
mods = Super
key = Escape
action = exec
command = pavucontrol

[bind]
mods = Super+Shift
key = Right
action = tile_right
when = [ "$MORPH_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Left
action = tile_left
when = [ "$MORPH_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Up
action = tile_up
when = [ "$MORPH_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Down
action = tile_down
when = [ "$MORPH_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Left
action = scroll_prev
when = [ "$MORPH_LAYOUT" = scroll ]

[bind]
mods = Super+Shift
key = Right
action = scroll_next
when = [ "$MORPH_LAYOUT" = scroll ]

