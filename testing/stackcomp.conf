# Copy to ~/.config/stackcomp/config or set STACKCOMP_CONFIG / stackcomp -c PATH
# Each [bind] block is one shortcut. Modifier set uses mods= (Super, Shift, Ctrl, Alt).
# Optional when= runs /bin/sh -c '...' on each key press; exit 0 means the bind is active.

[hooks]
startup = pkill -x waybar 2>/dev/null || true && waybar -c ./testing/waybar-stackcomp.jsonc -s ./testing/waybar-stackcomp.css &
shutdown = pkill -x waybar 2>/dev/null || true
# shutdown = pkill -x waybar 2>/dev/null || true
# reload = pkill -USR1 waybar 2>/dev/null || true

[layout_anim]
enabled = yes
speed = 10.0
epsilon = 0.25

[decoration]
strip_in_tile_scroll = yes

[bind]
mods = Super
key = Return
action = exec
command = alacritty

[bind]
mods = Super+Shift
key = Q
action = close

[bind]
mods = Super
key = Escape
action = exec
command = pavucontrol

[bind]
mods = Super+Alt
key = Left
action = workspace_prev

[bind]
mods = Super+Alt
key = Right
action = workspace_next

[bind]
mods = Super+Shift
key = Right
action = tile_right
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Left
action = tile_left
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Up
action = tile_up
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super+Shift
key = Down
action = tile_down
when = [ "$STACKCOMP_LAYOUT" = tile ]

[bind]
mods = Super
key = Left
action = scroll_prev
when = [ "$STACKCOMP_LAYOUT" = scroll ]

[bind]
mods = Super
key = Right
action = scroll_next
when = [ "$STACKCOMP_LAYOUT" = scroll ]

